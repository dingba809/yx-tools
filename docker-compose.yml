version: '3.8'

services:
  cloudflare-speedtest:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloudflare-speedtest:latest
    container_name: cloudflare-speedtest
    # 挂载数据目录，保存结果文件
    volumes:
      - ./data:/app/data
      # 可选：挂载配置文件目录
      - ./config:/app/config
    
    # 1. 引用下面定义的 macvlan 网络，并指定固定 IP
    networks:
      my_macvlan:
        ipv4_address: 192.168.0.221

    # 环境变量
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      # 定时任务配置（可选）
      # - CRON_SCHEDULE=0 2 * * * # 每天凌晨2点
      # - CRON_COMMAND=python3 /app/cloudflare_speedtest.py --mode beginner --count 10 --speed 1 --delay 1000
    # 保持容器运行（用于定时任务）
    stdin_open: true
    tty: true
    # 重启策略
    restart: unless-stopped
    # 工作目录
    working_dir: /app

# 2. 定义 macvlan 网络
networks:
  my_macvlan:
    driver: macvlan
    driver_opts:
      # 【重要】请将 eth0 替换为你宿主机的实际物理网卡名称（例如 enp3s0, br0 等）
      parent: eth0
    ipam:
      config:
        - subnet: 192.168.0.0/23       # 你的局域网网段
          gateway: 192.168.1.253        # 你的主路由/网关 IP